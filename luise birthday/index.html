<!DOCTYPE html>
<html lang="en">

<head>

<link rel="stylesheet" href="css/index.css">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Something is Coming ❤️</title>


<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">


<style>


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Quicksand',sans-serif;
}



body{

    overflow:hidden;

    background:
    linear-gradient(
    180deg,
    #ffd8eb,
    #ffc0da,
    #ffb3d4
    );

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

}



.container{

    text-align:center;
    z-index:2;
    padding:25px;

}



h1{

    color:white;
    font-size:2.5rem;
    margin-bottom:15px;

    text-shadow:
    0 3px 10px rgba(0,0,0,.15);

}



#countdown{

    color:white;
    font-size:2rem;
    font-weight:bold;
    margin-bottom:20px;

}



p{

    color:white;
    font-size:1.1rem;
    opacity:.95;

}





/* BUTTON */


#giftButton{


    display:none;


    margin-top:30px;


    padding:15px 35px;


    border:none;


    border-radius:50px;


    background:#ff7eb9;


    color:white;


    font-size:22px;


    cursor:pointer;


    transition:.3s;


    box-shadow:
    0 5px 15px rgba(0,0,0,.15);


}



#giftButton:hover{


    transform:scale(1.1);


    background:#ff5f9e;


}







/* FLOATING ANIMALS */


.animal{

    position:absolute;

    font-size:40px;

    animation:float linear infinite;

    user-select:none;

}



@keyframes float{


0%{

transform:
translateY(110vh)
rotate(0deg);

opacity:0;

}


10%{

opacity:1;

}


90%{

opacity:1;

}


100%{

transform:
translateY(-120vh)
rotate(360deg);

opacity:0;

}


}





.heart{


position:absolute;

color:white;

font-size:18px;

animation:float linear infinite;

opacity:.8;


}


</style>

</head>




<body>


<div class="container">


<h1>
💖 Something Special is Coming 💖
</h1>



<div id="countdown"></div>




<p>

Just a little longer...<br>

I can't wait for you to see what's waiting 

</p>



<button id="giftButton">

Open Your Gift 🎁

</button>


</div>






<script>


const birthday =
new Date("July 16, 2026 00:00:00").getTime();




function updateCountdown(){



const now =
new Date().getTime();



const distance =
birthday - now;





if(distance <= 0){



document.getElementById("countdown").innerHTML =
"Happy Birthday 🎉";



document.getElementById("giftButton").style.display =
"inline-block";



return;


}






const days =
Math.floor(
distance/(1000*60*60*24)
);



const hours =
Math.floor(
(distance%(1000*60*60*24))
/
(1000*60*60)
);



const mins =
Math.floor(
(distance%(1000*60*60))
/
(1000*60)
);



const secs =
Math.floor(
(distance%(1000*60))
/
1000
);





document.getElementById("countdown").innerHTML =

`${days}d ${hours}h ${mins}m ${secs}s`;



}




setInterval(updateCountdown,1000);


updateCountdown();








// PAGE DECORATIONS


const animals=[

"🐰",
"🐻",
"🐱",
"🦊",
"🐼",
"🐹",
"🐶",
"🐥"

];



const hearts=[

"🤍",
"💖",
"💕",
"💗",
"💝"

];







function spawn(){



const e =
document.createElement("div");





if(Math.random()>0.4){



e.className="animal";


e.innerHTML =
animals[
Math.floor(Math.random()*animals.length)
];



}else{



e.className="heart";


e.innerHTML =
hearts[
Math.floor(Math.random()*hearts.length)
];



}





e.style.left =
Math.random()*100+"vw";



e.style.animationDuration =
(8+Math.random()*8)+"s";



e.style.fontSize =
(20+Math.random()*30)+"px";



document.body.appendChild(e);





setTimeout(()=>{


e.remove();


},17000);



}





setInterval(spawn,400);




</script>



<script src="js/index.js"></script>


</body>

</html>
