<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Gift </title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/gift.css">

<link rel="stylesheet" href="css/player.css">

</head>

<body>
<div id="storyGuide">


    <h3>
        📖 Chapters
    </h3>


    <div class="guideItem">

        Chapter 1 
        <span>
            🎵 Song 1
        </span>

    </div>


    <div class="guideItem">

        Chapter 2 
        <span>
            🎵 Song 2
        </span>

    </div>


    <div class="guideItem">

        Chapter 3 
        <span>
            🎵 Song 3
        </span>

    </div>


    <div class="guideItem">

        Chapter 4 
        <span>
            🎵 Song 4
        </span>

    </div>


    <div class="guideItem">

        Chapter 5 
        <span>
            🎵 Song 5
        </span>

    </div>


</div>
<div id="player">

    <button id="toggle">
        🎵
    </button>

    <div id="panel">
        <p id="songTitle">
        </p>

        <div id="disc">
            💿
        </div>

        <div id="controls">

            <button id="back">⏮</button>
            <button id="play">▶</button>
            <button id="forward">⏭</button>

        </div>

    </div>

</div>

<div class="background"></div>

<div class="container">

    <h1>ISERACHUNG</h1>

    <p>READ THE SONG ORDER!!! THEN OPEN YOUR GIFT(CHAPTER 1 IS NEXT ONE)</p>

    <div id="gift">

        <div class="lid">
            <div class="bow">
                <div class="loop left"></div>
                <div class="loop right"></div>
                <div class="knot"></div>
            </div>
        </div>

        <div class="box">
            <div class="vertical-ribbon"></div>
            <div class="horizontal-ribbon"></div>
        </div>

    </div>
    <button id="letterButton">
    Open Your Letter 💌
</button>
</div>

<script src="js/gift.js"></script>
<script src="js/player.js"></script>

</body>
</html>
