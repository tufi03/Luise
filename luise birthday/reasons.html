<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reasons I Love You ❤️</title>

    <link rel="stylesheet" href="css/reasons.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">

</head>


<body>


<!-- ======================================
BACKGROUND
====================================== -->


<div id="background">


    <div id="stars"></div>

    <div id="animalLayer"></div>

    <div id="flowerLayer"></div>

    <div id="heartParticles"></div>


</div>



<!-- ======================================
INTRO MESSAGE
====================================== -->


<section id="intro">


    <p id="introText">
        I wanted to tell you something...
    </p>


    <p id="introText2">
        There are so many things I love about you ❤️
    </p>


</section>





<!-- ======================================
MAIN HEART AREA
====================================== -->


<section id="heartScene">


    <div id="bigHeart">

        ❤️

    </div>



    <!-- Individual hearts -->


    <div class="loveHeart" data-index="0">

        ❤️

    </div>


    <div class="loveHeart" data-index="1">

        ❤️

    </div>


    <div class="loveHeart" data-index="2">

        ❤️

    </div>


    <div class="loveHeart" data-index="3">

        ❤️

    </div>


    <div class="loveHeart" data-index="4">

        ❤️

    </div>



</section>





<!-- ======================================
MESSAGE POPUP
====================================== -->


<div id="messageBox">


    <div id="messageHeart">
        ❤️
    </div>


    <p id="loveMessage">

    </p>


</div>





<!-- ======================================
COMPLETION
====================================== -->


<section id="finish">


    <h1>
        And that's only a few reasons ❤️
    </h1>


    <p>
        There are too many to fit on one page.
    </p>


    <button id="continueButton">

        Continue ✨

    </button>


</section>





<!-- ======================================
DECORATION LAYERS
====================================== -->


<div id="petalLayer"></div>

<div id="sparkleLayer"></div>




<script src="js/reasons.js"></script>


</body>

</html>
