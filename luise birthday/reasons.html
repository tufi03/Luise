<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reasons I Love You Mausi </title>

    <link rel="stylesheet" href="css/reasons.css">
    <link rel="stylesheet" href="css/player.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">

</head>


<body>


<!-- ======================================
BACKGROUND
====================================== -->


<div id="background">


    <div id="stars"></div>

    <div id="animalLayer"></div>

    <div id="flowerLayer"></div>

    <div id="heartParticles"></div>


</div>


<div id="player">

    <button id="toggle">
        🎵
    </button>

    <div id="panel">

        <p id="songTitle">
        </p>

        <div id="disc">
            💿
        </div>

        <div id="controls">

            <button id="back">⏮</button>
            <button id="play">▶</button>
            <button id="forward">⏭</button>

        </div>

    </div>

</div>

<!-- ======================================
INTRO MESSAGE
====================================== -->


<section id="intro">


    <p id="introText">
        HEY GORGEOUS, IT'S ME AGAIN!!
    </p>


    <p id="introText2">
        THESE ARE A COUPLE OF MANY REASONS WHY I LOVE YOU
    </p>


</section>



<div id="gameHUD">

    <div>
        ⭐ Score:
        <span id="score">0</span>
    </div>

    <div>
        ⏱️ Time:
        <span id="timer">0</span>s
    </div>

</div>


<!-- ======================================
MAIN HEART AREA
====================================== -->


<section id="heartScene">


    <div id="bigHeart">

        ❤️

    </div>



    <!-- Individual hearts -->


    <div class="loveHeart" data-index="0">

        🎁

    </div>


    <div class="loveHeart" data-index="1">

        🎁

    </div>


    <div class="loveHeart" data-index="2">

        🎁

    </div>


    <div class="loveHeart" data-index="3">

        🎁

    </div>


    <div class="loveHeart" data-index="4">

        🎁

    </div>

    
    <div class="loveHeart" data-index="5">

        🎁

    </div>

    
    <div class="loveHeart" data-index="6">

        🎁

    </div>

    
    <div class="loveHeart" data-index="7">

        🎁

    </div>








</section>





<!-- ======================================
MESSAGE POPUP
====================================== -->


<div id="messageBox">


    <div id="messageHeart">
        ❤️
    </div>


    <p id="loveMessage">

    </p>


</div>





<!-- ======================================
COMPLETION
====================================== -->


<section id="finish">


    <h1>
        And most importantly
    </h1>


    <p>
        I LOVE HOW LIFE FEELS WORTH LIVING WITH YOU
    </p>


    <button id="continueButton">

        next, diva !!!

    </button>


</section>





<!-- ======================================
DECORATION LAYERS
====================================== -->


<div id="petalLayer"></div>

<div id="sparkleLayer"></div>

<script>
const pageSong = 1;
const autoPlaySong = true;
</script>

<script src="js/reasons.js"></script>
<script src="js/player.js"></script>

</html>
