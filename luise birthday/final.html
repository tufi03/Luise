<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>


<link rel="stylesheet" href="css/final.css">


<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">


</head>



<body>



<!-- ===================================
NIGHT BACKGROUND
=================================== -->


<div id="sky">


    <div id="stars"></div>


    <div id="floatingHearts"></div>


</div>







<!-- ===================================
INTRO TEXT
=================================== -->


<section id="intro">


<h1>
A little birthday surprise...
</h1>


<p>
Something special is waiting for you ✨
</p>


</section>








<!-- ===================================
PIXEL WORLD
=================================== -->


<section id="world">



<!-- animals -->


<div class="animal bunny">

🐰

</div>



<div class="animal bear">

🐻

</div>







<!-- flowers -->


<div class="flower leftFlower">

🌸

</div>



<div class="flower rightFlower">

🌷

</div>








<!-- gifts -->


<div class="gift leftGift">

🎁

</div>


<div class="gift rightGift">

🎁

</div>









<!-- CAKE -->


<div id="cake">



<div id="candles">



<div class="candle" data-candle="0">

<div class="flame"></div>

</div>



<div class="candle" data-candle="1">

<div class="flame"></div>

</div>



<div class="candle" data-candle="2">

<div class="flame"></div>

</div>



</div>





<div class="cakeTop"></div>


<div class="cakeBody">

</div>


</div>






</section>









<!-- ===================================
INSTRUCTIONS
=================================== -->


<section id="instructions">


<h2 id="instructionText">

Light the candles ✨

</h2>



<button id="wishButton">

Make a wish 🌟

</button>



</section>









<!-- ===================================
FINAL MESSAGE
=================================== -->


<section id="finalMessage">


<h1>

Happy Birthday ❤️

</h1>


<p>

I hope your day is filled with as much happiness as you bring into my life.

</p>


<p>

Thank you for being you ❤️

</p>


<h3>

— Toufi

</h3>


</section>







<script src="js/final.js"></script>


</body>

</html>
