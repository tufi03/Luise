<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday !!!!</title>


<link rel="stylesheet" href="css/final.css">
<link rel="stylesheet" href="css/player.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">


</head>



<body>



<!-- ===================================
NIGHT BACKGROUND
=================================== -->


<div id="sky">


    <div id="stars"></div>


    <div id="floatingHearts"></div>


</div>


<div id="player">

    <button id="toggle">
        🎵
    </button>

    <div id="panel">

        <p id="songTitle">
        </p>

        <div id="disc">
            💿
        </div>

        <div id="controls">

            <button id="back">⏮</button>
            <button id="play">▶</button>
            <button id="forward">⏭</button>

        </div>

    </div>

</div>



<!-- ===================================
INTRO TEXT
=================================== -->


<section id="intro">


<h1>
I BAKED YOU A CAKE (doesn't compare to what you can bake btw)
</h1>


<p>
    HAPPY BIRTHDAY LUISE
</p>


</section>








<!-- ===================================
PIXEL WORLD
=================================== -->


<section id="world">



<!-- animals -->


<div class="animal bunny">

🐰

</div>



<div class="animal bear">

🐻

</div>







<!-- flowers -->


<div class="flower leftFlower">

🌸

</div>



<div class="flower rightFlower">

🌷

</div>








<!-- gifts -->


<div class="gift leftGift">

🎁

</div>


<div class="gift rightGift">

🎁

</div>









<!-- CAKE -->


<div id="cake">



<div id="candles">



<div class="candle" data-candle="0">

<div class="flame"></div>

</div>



<div class="candle" data-candle="1">

<div class="flame"></div>

</div>



<div class="candle" data-candle="2">

<div class="flame"></div>

</div>



</div>





<div class="cakeTop"></div>


<div class="cakeBody">

</div>


</div>






</section>









<!-- ===================================
INSTRUCTIONS
=================================== -->


<section id="instructions">


<h2 id="instructionText">

Light the candles ✨(click on them :D)

</h2>



<button id="wishButton">

Make a wish 🌟 

</button>



</section>









<!-- ===================================
FINAL MESSAGE
=================================== -->


<section id="finalMessage">


<h1>

I LOVE YOU GORGEOUS

</h1>


<p>

i will always be by your side, my love.

</p>


<p>

Thank you for being you 

</p>


<h3>

— Toufi

</h3>
<button id="homeButton">
    📖 Back to Beginning
</button>

</section>




<script>
const pageSong = 5;
const autoPlaySong = true;
</script>


<script src="js/final.js"></script>
<script src="js/player.js"></script>

</body>

</html>
